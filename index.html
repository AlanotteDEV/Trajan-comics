<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trajan Comics Map</title>
<style>
  :root {
    --bg-dark: #1a1410;
    --orange: #ff8c1a;
    --orange-deep: #e8650a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg-dark);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px 0 60px;
  }

  .map-wrap {
    position: relative;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
  }

  .map-wrap img {
    display: block;
    width: 100%;
    border-radius: 8px;
    user-select: none;
    -webkit-user-drag: none;
  }

  .marker {
    position: absolute;
    width: 7%;
    aspect-ratio: 1;
    border-radius: 50%;
    border: 3px solid white;
    cursor: pointer;
    transform: translate(-50%, -50%);
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    -webkit-tap-highlight-color: transparent;
  }

  .marker:hover, .marker:focus {
    transform: translate(-50%, -50%) scale(1.18);
    box-shadow: 0 4px 14px rgba(0,0,0,0.65);
    outline: none;
    z-index: 6;
  }

  .marker:active {
    transform: translate(-50%, -50%) scale(1.05);
  }

  .marker::after {
    content: '';
    width: 38%;
    height: 38%;
    background: white;
    border-radius: 50%;
  }

  .marker.pulse::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid currentColor;
    opacity: 0.6;
    animation: pulse 2s ease-out infinite;
    pointer-events: none;
  }

  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.7; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* Overlay + Popup */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }

  .overlay.active {
    display: flex;
  }

  .popup {
    background: #fffaf2;
    border-radius: 16px;
    max-width: 380px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    transform: translateY(20px) scale(0.95);
    opacity: 0;
    animation: popIn 0.25s forwards;
    border: 4px solid var(--orange);
  }

  @keyframes popIn {
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .popup-header {
    padding: 18px 50px 14px 20px;
    color: white;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: 0.5px;
    position: relative;
  }

  .popup-close {
    position: absolute;
    top: 10px;
    right: 12px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: none;
    color: white;
    font-size: 1.2rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .popup-close:hover {
    background: rgba(255,255,255,0.4);
  }

  .popup-body {
    padding: 18px 20px 22px;
    color: #3a2c1f;
    font-size: 1rem;
    line-height: 1.5;
  }

  .popup-body p {
    margin: 0 0 10px;
  }

  .popup-body p:last-child {
    margin-bottom: 0;
  }

  .popup-links {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 16px;
  }

  .popup-link {
    flex: 1 1 auto;
    text-align: center;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.92rem;
    padding: 10px 14px;
    border-radius: 10px;
    background: var(--orange);
    color: white;
    transition: filter 0.15s ease, transform 0.15s ease;
    white-space: nowrap;
  }

  .popup-link:hover {
    filter: brightness(1.1);
    transform: translateY(-1px);
  }

  .popup-link.secondary {
    background: #3a2c1f;
  }

  .popup-icon {
    font-size: 1.6rem;
    margin-right: 8px;
  }

  .title-bar {
    text-align: center;
    color: var(--orange);
    font-weight: 900;
    font-size: 1.6rem;
    margin-bottom: 14px;
    letter-spacing: 1px;
    text-shadow: 0 0 12px rgba(255,140,26,0.4);
  }

  .hint {
    text-align: center;
    color: #aaa;
    font-size: 0.85rem;
    margin-top: 14px;
    font-style: italic;
  }
</style>
</head>
<body>

<div style="max-width:560px; width:100%;">
  <div class="title-bar">🗺️ Trajan Comics Map</div>

  <div class="map-wrap">
    <img src="trajan-map.jpg" alt="Mappa evento Trajan Comics">

    <!-- Marker: Trucco e parrucco (rosa) -->
    <div class="marker pulse" style="left:34.3%; top:18.5%; background:#ff3fb0; color:#ff3fb0;"
         tabindex="0" role="button" aria-label="Trucco e parrucco"
         data-title="💄 Trucco e parrucco"
         data-color="#ff3fb0"
         data-body="Vieni a trasformarti! Truccatori e parrucchieri professionisti ti aiuteranno a completare il tuo cosplay con make-up a tema e acconciature ispirate ai tuoi personaggi preferiti.<br><br><strong>Aggiungi qui orari e dettagli specifici.</strong>">
    </div>

    <!-- Marker: Console DJ (azzurro) -->
    <div class="marker pulse" style="left:30.5%; top:31.5%; background:#1fc7e0; color:#1fc7e0;"
         tabindex="0" role="button" aria-label="Console DJ"
         data-title="🎧 Console DJ"
         data-color="#1fc7e0"
         data-body="La musica che accompagna tutto l'evento! Qui trovi la console del DJ con set a tema anime, videogiochi e colonne sonore manga.<br><br><strong>Aggiungi qui orari e dettagli specifici.</strong>">
    </div>

    <!-- Marker: Giochi da tavolo (bordeaux) -->
    <div class="marker pulse" style="left:54.6%; top:35.0%; background:#8b1a2b; color:#8b1a2b;"
         tabindex="0" role="button" aria-label="Giochi da tavolo"
         data-title="🎲 Giochi da tavolo"
         data-color="#8b1a2b"
         data-body="Area gestita dai ragazzi del Furor Normannorum di Canosa: giochi da tavolo, demo e sfide aperte a tutti gli appassionati. Vieni a scoprire i giochi in programma!"
         data-links='[{"label":"📷 Instagram","url":"https://www.instagram.com/furorenormannorumcanosa/"}]'>
    </div>

    <!-- Marker: Stand Manbaga (rosso) -->
    <div class="marker pulse" style="left:55.6%; top:24.0%; background:#e62b2b; color:#e62b2b;"
         tabindex="0" role="button" aria-label="Stand Manbaga"
         data-title="📚 Stand Manbaga"
         data-color="#e62b2b"
         data-body="Fumetteria di Canosa di Puglia specializzata in manga, fumetti, trading card game (Pokémon, Yu-Gi-Oh!, Magic, One Piece) e gadget a tema anime. Allo stand troverai novità, gadget esclusivi e tanto altro!"
         data-links='[{"label":"📷 Instagram","url":"https://www.instagram.com/_manbaga_/"},{"label":"🌐 Sito web","url":"https://manbagacomicsandgames.vercel.app/"}]'>
    </div>

    <!-- Marker: Fai Da Tela (arancione) -->
    <div class="marker pulse" style="left:64.2%; top:34.0%; background:#ff9a1f; color:#ff9a1f;"
         tabindex="0" role="button" aria-label="Fai Da Tela"
         data-title="🎨 Fai Da Tela"
         data-color="#ff9a1f"
         data-body="Stand a tema artistico/tattoo: vieni a scoprire le creazioni a tema manga e anime di Fai Da Tela. Segui la pagina Instagram per maggiori dettagli su cosa trovare allo stand!"
         data-links='[{"label":"📷 Instagram","url":"https://www.instagram.com/fai.da.tela_tattoo/"}]'>
    </div>

    <!-- Marker: Panificio Traiano (food, in basso) -->
    <div class="marker pulse" style="left:58.2%; top:89.2%; background:#ff8c1a; color:#ff8c1a;"
         tabindex="0" role="button" aria-label="Panificio Traiano"
         data-title="🍞 Panificio Traiano"
         data-color="#ff8c1a"
         data-body="Punto ristoro dell'evento: panini, focacce e bevande per ricaricarti tra una postazione e l'altra.<br><br><strong>Aggiungi qui orari e dettagli specifici.</strong>">
    </div>

  </div>

  <div class="hint">Tocca un pin colorato per scoprire cosa trovi in ogni postazione ✨</div>
</div>

<!-- Popup overlay -->
<div class="overlay" id="overlay">
  <div class="popup" id="popup">
    <div class="popup-header" id="popupHeader">
      <button class="popup-close" id="popupClose" aria-label="Chiudi">✕</button>
      <span id="popupTitle"></span>
    </div>
    <div class="popup-body" id="popupBody"></div>
  </div>
</div>

<script>
  const overlay = document.getElementById('overlay');
  const popupHeader = document.getElementById('popupHeader');
  const popupTitle = document.getElementById('popupTitle');
  const popupBody = document.getElementById('popupBody');
  const popupClose = document.getElementById('popupClose');

  function openPopup(marker) {
    const title = marker.getAttribute('data-title');
    const body = marker.getAttribute('data-body');
    const color = marker.getAttribute('data-color');
    const linksAttr = marker.getAttribute('data-links');

    popupTitle.textContent = title;
    popupHeader.style.background = color;

    let html = `<p>${body}</p>`;

    if (linksAttr) {
      try {
        const links = JSON.parse(linksAttr);
        if (Array.isArray(links) && links.length) {
          html += '<div class="popup-links">';
          links.forEach((link, i) => {
            const cls = i === 0 ? 'popup-link' : 'popup-link secondary';
            html += `<a class="${cls}" href="${link.url}" target="_blank" rel="noopener noreferrer">${link.label}</a>`;
          });
          html += '</div>';
        }
      } catch (e) {
        console.warn('data-links non valido:', e);
      }
    }

    popupBody.innerHTML = html;
    overlay.classList.add('active');
  }

  function closePopup() {
    overlay.classList.remove('active');
  }

  document.querySelectorAll('.marker').forEach(marker => {
    marker.addEventListener('click', () => openPopup(marker));
    marker.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openPopup(marker);
      }
    });
  });

  popupClose.addEventListener('click', closePopup);
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closePopup();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePopup();
  });
</script>

</body>
</html>
